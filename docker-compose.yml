services:
  server:
    build:
      context: ./server
    environment:
      NODE_ENV: production
      PORT: 3100
      DB_PATH: /app/data/mahjong.db
      CORS_ORIGIN: http://localhost:8899
    volumes:
      - ./server/data:/app/data
    expose:
      - "3100"
    restart: unless-stopped

  web:
    build:
      context: ./web
    ports:
      - "8899:80"
    depends_on:
      - server
    restart: unless-stopped
